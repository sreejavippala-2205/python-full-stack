<!doctype html>
<html>
  <head>
    <title>Student Registration</title>
  </head>
  <body>
    <form>
      <!-- border="1" creates the grid lines, and width sets the table size -->
      <table border="1" width="350" cellpadding="8" cellspacing="0">
        <tr>
          <!-- colspan="2" merges the cells for the header row -->
          <th colspan="2" align="center">Student registration</th>
        </tr>
        <tr>
          <td>Name</td>
          <td><input type="text" /></td>
        </tr>
        <tr>
          <td>age</td>
          <td><input type="number" /></td>
        </tr>
        <tr>
          <td>email</td>
          <td><input type="email" /></td>
        </tr>
        <tr>
          <td>mobile</td>
          <td><input type="tel" /></td>
        </tr>
        <tr>
          <td>Gender</td>
          <td>
            <input type="radio" name="gender" /> Female
            <input type="radio" name="gender" /> Male
          </td>
        </tr>
        <tr>
          <td>language</td>
          <td>
            <input type="checkbox" /> Telugu <input type="checkbox" /> Hindi
            <br />
            <input type="checkbox" /> English
          </td>
        </tr>
        <tr>
          <td>DOB</td>
          <td><input type="date" /></td>
        </tr>
        <tr>
          <td align="center">
            <input type="reset" value="Reset" />
          </td>
          <td align="center">
            <input type="submit" value="submit" />
          </td>
        </tr>
      </table>
    </form>
  </body>
</html>
