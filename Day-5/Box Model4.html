<html>
  <head>
    <title>Box Model</title>
    <style>
      body {
        background-color: aqua;
      }
      .parent1 {
        background-color: RED;
        border: 2px solid black;
        padding: 40px;
      }
      .parent2 {
        background-color: pink;
        border: 2px solid black;
        padding: 50px;
      }

      .child1 {
        background-color: white;
      }
      .child2 {
        background-color: darkblue;
        color: white;
      }
      .child3 {
        background-color: yellow;
      }
    </style>
  </head>
  <body>
    <div class="parent1">
      <div class="child1">Arifa</div>
      <div class="child2">Sreeja</div>
      <div class="child3">Sri Lakshmi</div>
    </div>
    <div class="parent2">
      <div class="p2-child1">hello</div>
    </div>
  </body>
</html>
